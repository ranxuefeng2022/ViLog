<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vlog电池数据可视化</title>
  <link rel="stylesheet" href="renderer/css/vlog-chart.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>📊 Vlog电池数据可视化</h1>
        <div class="file-info" id="fileInfo">加载数据中...</div>
      </div>
    </header>

    <div class="chart-card">
      <h2>📈 综合数据对比（多坐标轴）</h2>
      <div class="chart-container">
        <canvas id="mainChart"></canvas>
      </div>
      <div class="controls">
        <button class="btn btn-warning" id="resetZoomBtn">🔍 重置缩放</button>
        <button class="btn btn-primary" id="exportChartBtn">📷 导出图表</button>
        <button class="btn btn-secondary" id="toggleAllBtn">👁️ 显示/隐藏所有</button>
      </div>
    </div>
  </div>

  <script src="renderer/js/vlog-chart.js"></script>
  <script>
    document.getElementById('resetZoomBtn').addEventListener('click', resetZoom);
    document.getElementById('exportChartBtn').addEventListener('click', exportChart);
    document.getElementById('toggleAllBtn').addEventListener('click', toggleAll);
  </script>
</body>
</html>
