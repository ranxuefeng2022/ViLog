<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vlog电池数据可视化</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }
    .container {
      max-width: 100%;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px 30px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      font-size: 1.8em;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .file-info {
      color: #00d9ff;
      font-size: 0.95em;
    }
    .chart-card {
      background: rgba(255, 255, 255, 0.08);
      padding: 25px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      margin-bottom: 30px;
    }
    .chart-card h2 {
      color: #00d9ff;
      margin-bottom: 20px;
      font-size: 1.5em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chart-card h2::before {
      content: '';
      width: 4px;
      height: 28px;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      border-radius: 2px;
    }
    .chart-container {
      position: relative;
      height: 500px;
    }
    .controls {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .btn {
      padding: 10px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      font-size: 0.95em;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
      color: #1a1a2e;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .btn-warning {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
      border: 1px solid rgba(255, 193, 7, 0.3);
    }
    .btn-warning:hover {
      background: rgba(255, 193, 7, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>📊 Vlog电池数据可视化</h1>
        <div class="file-info" id="fileInfo">加载数据中...</div>
      </div>
    </header>

    <div class="chart-card">
      <h2>📈 综合数据对比（多坐标轴）</h2>
      <div class="chart-container">
        <canvas id="mainChart"></canvas>
      </div>
      <div class="controls">
        <button class="btn btn-warning" onclick="resetZoom()">🔍 重置缩放</button>
        <button class="btn btn-primary" onclick="exportChart()">📷 导出图表</button>
        <button class="btn btn-secondary" onclick="toggleAll()">👁️ 显示/隐藏所有</button>
      </div>
    </div>
  </div>

  <script>
    // 数据将在这里注入
    let rawData = [];
    const colors = [
      'rgb(255, 99, 132)', 'rgb(54, 162, 235)', 'rgb(255, 206, 86)',
      'rgb(75, 192, 192)', 'rgb(153, 102, 255)', 'rgb(255, 159, 64)',
      'rgb(199, 199, 199)', 'rgb(83, 102, 147)', 'rgb(255, 99, 255)',
      'rgb(99, 255, 132)', 'rgb(132, 99, 255)', 'rgb(255, 132, 99)'
    ];

    // 从Electron接收数据
    window.electronAPI?.onVlogData?.((data) => {
      rawData = data;
      initChart();
      document.getElementById('fileInfo').textContent = `记录数: ${rawData.length} 条`;
    });

    function parseTime(str) {
      const parts = str.split(/[- :]/);
      if (parts.length >= 6) {
        return new Date(parts[0], parts[1] - 1, parts[2], parts[3], parts[4], parts[5]);
      }
      return new Date();
    }

    let chart = null;

    function initChart() {
      if (rawData.length === 0) return;

      const labels = rawData.map(d => parseTime(d.time));
      const fieldNames = Object.keys(rawData[0]).filter(k => k !== 'time' && k !== 'version');

      const priorityFields = ['电量', '电池电压'];

      const acChargePoints = [];
      const usbChargePoints = [];
      const chargeStateData = rawData.map(d => parseInt(d['充电状态']) || 0);

      for (let i = 1; i < chargeStateData.length; i++) {
        if (chargeStateData[i-1] === 0) {
          if (chargeStateData[i] === 1) {
            acChargePoints.push({ x: labels[i], y: 0 });
          } else if (chargeStateData[i] === 2) {
            usbChargePoints.push({ x: labels[i], y: 0 });
          }
        }
      }

      const datasets = fieldNames.map((name, index) => {
        const data = rawData.map(d => {
          const value = parseFloat(d[name]) || 0;
          if (name === '电池温度' || name === '板温') {
            return value / 10;
          }
          return value;
        });

        return {
          label: name,
          data: data,
          borderColor: colors[index % colors.length],
          backgroundColor: colors[index % colors.length].replace('rgb', 'rgba').replace(')', ', 0.1)'),
          borderWidth: 2,
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 6,
          yAxisID: 'y' + index,
          hidden: !priorityFields.includes(name)
        };
      });

      if (acChargePoints.length > 0) {
        datasets.unshift({
          label: '🔌 AC充电器',
          data: acChargePoints,
          type: 'scatter',
          backgroundColor: 'rgb(255, 0, 0)',
          borderColor: 'rgb(255, 0, 0)',
          pointRadius: 10,
          pointHoverRadius: 12,
          pointStyle: 'triangle',
          yAxisID: 'y0',
          order: -2
        });
      }

      if (usbChargePoints.length > 0) {
        datasets.unshift({
          label: '🔌 USB充电器',
          data: usbChargePoints,
          type: 'scatter',
          backgroundColor: 'rgb(0, 150, 255)',
          borderColor: 'rgb(0, 150, 255)',
          pointRadius: 10,
          pointHoverRadius: 12,
          pointStyle: 'circle',
          yAxisID: 'y0',
          order: -1
        });
      }

      const ctx = document.getElementById('mainChart').getContext('2d');

      const yAxesConfig = {};
      datasets.forEach((ds, index) => {
        if (ds.type === 'scatter') return;
        yAxesConfig[ds.yAxisID] = {
          type: 'linear',
          display: false,
          position: parseInt(ds.yAxisID.substring(1)) % 2 === 0 ? 'left' : 'right',
          ticks: {
            color: 'transparent',
            font: { size: 11 },
            maxTicksLimit: 10
          },
          grid: {
            color: 'transparent',
            drawOnChartArea: false
          },
          title: {
            display: false,
            text: ds.label,
            color: colors[index % colors.length],
            font: { size: 11 }
          }
        };
      });

      chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: {
                color: '#e0e0e0',
                font: { size: 12 },
                usePointStyle: true,
                padding: 15
              },
              onClick: (e, legendItem, legend) => {
                const index = legendItem.datasetIndex;
                const ci = legend.chart;
                const ds = ci.data.datasets[index];
                if (ds.type === 'scatter') return;
                ds.hidden = !ds.hidden;
                const isHidden = ds.hidden;
                const yAxisId = ds.yAxisID;
                const yAxis = ci.scales[yAxisId];
                if (yAxis) {
                  yAxis.options.display = !isHidden;
                  yAxis.options.title.display = !isHidden;
                  const fieldIndex = fieldNames.indexOf(ds.label);
                  yAxis.options.ticks.color = isHidden ? 'transparent' : colors[fieldIndex % colors.length];
                  yAxis.options.grid.color = isHidden ? 'transparent' : 'rgba(255, 255, 255, 0.1)';
                  yAxis.options.grid.drawOnChartArea = !isHidden;
                }
                ci.update();
              }
            },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              titleColor: '#00d9ff',
              bodyColor: '#e0e0e0',
              borderColor: '#00d9ff',
              borderWidth: 1,
              padding: 12,
              callbacks: {
                label: function(context) {
                  let label = context.dataset.label || '';
                  if (label) label += ': ';
                  if (context.parsed.y !== null) label += context.parsed.y.toFixed(2);
                  if (['电量', '电池电压'].includes(context.dataset.label)) label += ' ★';
                  return label;
                },
                afterBody: function(tooltipItems) {
                  if (tooltipItems.length > 0) {
                    const index = tooltipItems[0].dataIndex;
                    const data = rawData[index];
                    const batteryTemp = (parseFloat(data['电池温度']) || 0) / 10;
                    const boardTemp = (parseFloat(data['板温']) || 0) / 10;
                    return ['', '━━━━━━━━━━━━━━━━', '🌡️ 电池温度: ' + batteryTemp.toFixed(1) + '°C', '🔥 板温: ' + boardTemp.toFixed(1) + '°C'];
                  }
                  return [];
                }
              }
            },
            zoom: {
              pan: { enabled: true, mode: 'x' },
              zoom: {
                wheel: { enabled: true },
                pinch: { enabled: true },
                mode: 'x'
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                displayFormats: {
                  minute: 'HH:mm',
                  hour: 'HH:mm',
                  day: 'MM-dd HH:mm'
                }
              },
              ticks: {
                color: '#a0a0a0',
                maxRotation: 45,
                maxTicksLimit: 10
              },
              grid: {
                color: 'rgba(255, 255, 255, 0.1)'
              }
            },
            ...yAxesConfig
          }
        }
      });

      chart.data.datasets.forEach((ds, index) => {
        if (ds.type === 'scatter') return;
        if (!ds.hidden) {
          const yAxis = chart.scales[ds.yAxisID];
          if (yAxis) {
            const fieldIndex = fieldNames.indexOf(ds.label);
            yAxis.options.display = true;
            yAxis.options.title.display = true;
            yAxis.options.ticks.color = colors[fieldIndex % colors.length];
            yAxis.options.grid.color = 'rgba(255, 255, 255, 0.1)';
            yAxis.options.grid.drawOnChartArea = true;
          }
        }
      });
      chart.update('none');
    }

    function resetZoom() {
      if (chart) chart.resetZoom();
    }

    function exportChart() {
      if (!chart) return;
      const link = document.createElement('a');
      link.download = 'vlog-chart.png';
      link.href = chart.toBase64Image();
      link.click();
    }

    let allVisible = true;
    function toggleAll() {
      if (!chart) return;
      allVisible = !allVisible;
      let lineDatasetIndex = 0;
      chart.data.datasets.forEach((ds, index) => {
        if (ds.type === 'scatter') return;
        ds.hidden = allVisible;
        const yAxis = chart.scales[ds.yAxisID];
        if (yAxis) {
          if (!allVisible) {
            yAxis.options.display = true;
            yAxis.options.title.display = true;
            yAxis.options.ticks.color = colors[lineDatasetIndex % colors.length];
            yAxis.options.grid.color = 'rgba(255, 255, 255, 0.1)';
            yAxis.options.grid.drawOnChartArea = lineDatasetIndex < 2;
          } else {
            yAxis.options.display = false;
            yAxis.options.title.display = false;
            yAxis.options.ticks.color = 'transparent';
            yAxis.options.grid.color = 'transparent';
            yAxis.options.grid.drawOnChartArea = false;
          }
        }
        lineDatasetIndex++;
      });
      chart.update();
    }
  </script>
</body>
</html>
